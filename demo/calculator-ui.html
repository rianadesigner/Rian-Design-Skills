<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calculator</title>
  <meta name="description" content="Minimal dark calculator — tap keys or use keyboard." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { font-family: 'Outfit', system-ui, sans-serif; }
    .display-num { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }
    @media (prefers-reduced-motion: reduce) {
      * { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
    }
    :focus-visible {
      outline: 2px solid #0d9488;
      outline-offset: 2px;
    }
    .calc-key { transition: transform 0.15s ease, background-color 0.15s ease, box-shadow 0.15s ease; }
  </style>
</head>
<body class="min-h-dvh bg-[#0f1419] text-[#e8eef4] flex flex-col items-center justify-center p-4 sm:p-6 gap-4">
  <p class="text-[11px] text-[#6b7c8f] text-center max-w-[320px]">Preview: click keys or use keyboard (0–9, + − × ÷, Enter, Escape, Backspace)</p>

  <div
    class="w-full max-w-[320px] rounded-[28px] bg-[#1a222d] p-4 shadow-[0_24px_64px_rgba(0,0,0,0.45),inset_0_1px_0_rgba(255,255,255,0.06)] border border-white/[0.08]"
    role="application"
    aria-label="Calculator"
  >
    <div class="mb-4 rounded-2xl bg-[#12181f] px-4 py-4 border border-white/[0.06]">
      <p class="text-[11px] font-medium uppercase tracking-[0.15em] text-[#6b7c8f] mb-1">Expression</p>
      <p id="calc-expression" class="display-num text-right text-sm text-[#6b7c8f] min-h-[1.25rem] truncate" aria-hidden="true">&nbsp;</p>
      <p
        id="calc-display"
        class="display-num text-right text-4xl font-semibold tracking-tight text-white mt-1 truncate min-h-[2.5rem]"
        aria-live="polite"
        aria-atomic="true"
      >
        0
      </p>
    </div>

    <div class="grid grid-cols-4 gap-2.5" role="group" aria-label="Keypad">
      <button type="button" data-action="clear" class="calc-key h-14 min-h-[48px] rounded-2xl bg-[#252f3d] text-[15px] font-semibold text-[#e8eef4] border border-white/[0.06] hover:bg-[#2d3a4d] active:scale-[0.97]" aria-label="All clear">AC</button>
      <button type="button" data-action="sign" class="calc-key h-14 min-h-[48px] rounded-2xl bg-[#252f3d] text-[15px] font-semibold text-[#e8eef4] border border-white/[0.06] hover:bg-[#2d3a4d] active:scale-[0.97]" aria-label="Plus minus toggle">±</button>
      <button type="button" data-action="percent" class="calc-key h-14 min-h-[48px] rounded-2xl bg-[#252f3d] text-[15px] font-semibold text-[#e8eef4] border border-white/[0.06] hover:bg-[#2d3a4d] active:scale-[0.97]" aria-label="Percent">%</button>
      <button type="button" data-op="/" class="calc-key op h-14 min-h-[48px] rounded-2xl bg-[#0d9488] text-[18px] font-semibold text-white border border-[#0f7668]/50 hover:bg-[#0f7668] active:scale-[0.97] shadow-[0_4px_16px_rgba(13,148,136,0.35)]" aria-label="Divide">÷</button>

      <button type="button" data-digit="7" class="calc-key h-14 min-h-[48px] rounded-2xl bg-[#2a3545] text-[18px] font-semibold border border-white/[0.05] hover:bg-[#323f52] active:scale-[0.97]" aria-label="7">7</button>
      <button type="button" data-digit="8" class="calc-key h-14 min-h-[48px] rounded-2xl bg-[#2a3545] text-[18px] font-semibold border border-white/[0.05] hover:bg-[#323f52] active:scale-[0.97]" aria-label="8">8</button>
      <button type="button" data-digit="9" class="calc-key h-14 min-h-[48px] rounded-2xl bg-[#2a3545] text-[18px] font-semibold border border-white/[0.05] hover:bg-[#323f52] active:scale-[0.97]" aria-label="9">9</button>
      <button type="button" data-op="*" class="calc-key op h-14 min-h-[48px] rounded-2xl bg-[#0d9488] text-[18px] font-semibold text-white border border-[#0f7668]/50 hover:bg-[#0f7668] active:scale-[0.97]" aria-label="Multiply">×</button>

      <button type="button" data-digit="4" class="calc-key h-14 min-h-[48px] rounded-2xl bg-[#2a3545] text-[18px] font-semibold border border-white/[0.05] hover:bg-[#323f52] active:scale-[0.97]" aria-label="4">4</button>
      <button type="button" data-digit="5" class="calc-key h-14 min-h-[48px] rounded-2xl bg-[#2a3545] text-[18px] font-semibold border border-white/[0.05] hover:bg-[#323f52] active:scale-[0.97]" aria-label="5">5</button>
      <button type="button" data-digit="6" class="calc-key h-14 min-h-[48px] rounded-2xl bg-[#2a3545] text-[18px] font-semibold border border-white/[0.05] hover:bg-[#323f52] active:scale-[0.97]" aria-label="6">6</button>
      <button type="button" data-op="-" class="calc-key op h-14 min-h-[48px] rounded-2xl bg-[#0d9488] text-[18px] font-semibold text-white border border-[#0f7668]/50 hover:bg-[#0f7668] active:scale-[0.97]" aria-label="Subtract">−</button>

      <button type="button" data-digit="1" class="calc-key h-14 min-h-[48px] rounded-2xl bg-[#2a3545] text-[18px] font-semibold border border-white/[0.05] hover:bg-[#323f52] active:scale-[0.97]" aria-label="1">1</button>
      <button type="button" data-digit="2" class="calc-key h-14 min-h-[48px] rounded-2xl bg-[#2a3545] text-[18px] font-semibold border border-white/[0.05] hover:bg-[#323f52] active:scale-[0.97]" aria-label="2">2</button>
      <button type="button" data-digit="3" class="calc-key h-14 min-h-[48px] rounded-2xl bg-[#2a3545] text-[18px] font-semibold border border-white/[0.05] hover:bg-[#323f52] active:scale-[0.97]" aria-label="3">3</button>
      <button type="button" data-op="+" class="calc-key op h-14 min-h-[48px] rounded-2xl bg-[#0d9488] text-[18px] font-semibold text-white border border-[#0f7668]/50 hover:bg-[#0f7668] active:scale-[0.97]" aria-label="Add">+</button>

      <button type="button" data-digit="0" class="calc-key col-span-2 h-14 min-h-[48px] rounded-2xl bg-[#2a3545] text-[18px] font-semibold border border-white/[0.05] hover:bg-[#323f52] active:scale-[0.97]" aria-label="0">0</button>
      <button type="button" data-action="dot" class="calc-key h-14 min-h-[48px] rounded-2xl bg-[#2a3545] text-[18px] font-semibold border border-white/[0.05] hover:bg-[#323f52] active:scale-[0.97]" aria-label="Decimal point">.</button>
      <button type="button" data-action="equals" class="calc-key h-14 min-h-[48px] rounded-2xl bg-[#f59e0b] text-[18px] font-semibold text-[#1a1206] border border-[#d97706]/40 hover:bg-[#fbbf24] active:scale-[0.97] shadow-[0_4px_16px_rgba(245,158,11,0.35)]" aria-label="Equals">=</button>
    </div>

    <p class="mt-3 text-center text-[10px] text-[#5c6b7a]">Outfit + JetBrains Mono · 48px keys · WCAG focus ring</p>
  </div>

  <script>
    (function () {
      const display = document.getElementById('calc-display');
      const expressionEl = document.getElementById('calc-expression');
      let current = '0';
      let stored = null;
      let pendingOp = null;
      let fresh = true;

      const opSymbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };

      function formatExpr() {
        if (stored == null || !pendingOp) return '\u00a0';
        const a = formatNum(stored);
        return a + ' ' + opSymbols[pendingOp];
      }

      function formatNum(n) {
        if (!Number.isFinite(n)) return 'Error';
        const s = String(n);
        if (s.length > 12) return Number(n).toPrecision(8);
        return s.replace(/\.0+$/, '').replace(/(\.\d*?)0+$/, '$1').replace(/\.$/, '');
      }

      function update() {
        display.textContent = current;
        expressionEl.textContent = formatExpr();
      }

      function inputDigit(d) {
        if (fresh) {
          current = d;
          fresh = false;
        } else {
          if (current === '0' && d !== '.') current = d;
          else if (current.length < 14) current += d;
        }
        update();
      }

      function inputDot() {
        if (fresh) {
          current = '0.';
          fresh = false;
        } else if (!current.includes('.')) {
          current += '.';
        }
        update();
      }

      function applyOp(nextOp) {
        const n = parseFloat(current);
        if (!Number.isFinite(n)) return;
        if (stored == null) {
          stored = n;
        } else if (pendingOp && !fresh) {
          stored = compute(stored, n, pendingOp);
          current = formatNum(stored);
        }
        pendingOp = nextOp;
        fresh = true;
        update();
      }

      function compute(a, b, op) {
        switch (op) {
          case '+': return a + b;
          case '-': return a - b;
          case '*': return a * b;
          case '/': return b === 0 ? NaN : a / b;
          default: return b;
        }
      }

      function equals() {
        if (pendingOp == null || stored == null) return;
        const b = parseFloat(current);
        const r = compute(stored, b, pendingOp);
        current = formatNum(r);
        stored = null;
        pendingOp = null;
        fresh = true;
        update();
      }

      function clearAll() {
        current = '0';
        stored = null;
        pendingOp = null;
        fresh = true;
        update();
      }

      function toggleSign() {
        if (current === '0' && fresh) return;
        if (current.startsWith('-')) current = current.slice(1);
        else current = '-' + current;
        update();
      }

      function percent() {
        const n = parseFloat(current);
        if (!Number.isFinite(n)) return;
        current = formatNum(n / 100);
        update();
      }

      document.querySelector('[role="group"]').addEventListener('click', function (e) {
        const btn = e.target.closest('button');
        if (!btn) return;
        const d = btn.getAttribute('data-digit');
        const op = btn.getAttribute('data-op');
        const act = btn.getAttribute('data-action');
        if (d != null) inputDigit(d);
        else if (op) applyOp(op);
        else if (act === 'equals') equals();
        else if (act === 'clear') clearAll();
        else if (act === 'sign') toggleSign();
        else if (act === 'percent') percent();
        else if (act === 'dot') inputDot();
      });

      document.addEventListener('keydown', function (e) {
        if (e.key >= '0' && e.key <= '9') { e.preventDefault(); inputDigit(e.key); return; }
        if (e.key === '.') { e.preventDefault(); inputDot(); return; }
        if (e.key === 'Enter' || e.key === '=') { e.preventDefault(); equals(); return; }
        if (e.key === 'Escape') { e.preventDefault(); clearAll(); return; }
        if (e.key === 'Backspace') {
          e.preventDefault();
          if (!fresh && current.length > 1) current = current.slice(0, -1);
          else { current = '0'; fresh = true; }
          update();
          return;
        }
        const map = { '+': '+', '-': '-', '*': '*', '/': '/' };
        if (map[e.key]) { e.preventDefault(); applyOp(map[e.key]); return; }
      });

      update();
    })();
  </script>
</body>
</html>
